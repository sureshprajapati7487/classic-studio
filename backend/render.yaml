services:
  - type: web
    name: proeditor-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false   # Set in Render dashboard: your Vercel URL
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard: random 32-char secret
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: INSTAGRAM_URL
        sync: false
      - key: EDITOR_NAME
        sync: false
